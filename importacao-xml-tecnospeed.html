<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar XML Tecnospeed</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
:root {
    --azul: #007bff;
    --azul-hover: #0056b3;
    --cinza: #6c757d;
    --cinza-hover: #5a6268;
    --borda: #dfe3e8;
    --fundo: #eef2f7;
    --texto: #333;
}

* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--fundo);
    margin: 0;
    padding: 20px;
}

.container {
    background: #fff;
    max-width: 600px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0,0,0,.08);
}

h1 {
    margin: 0 0 25px;
    text-align: center;
    color: var(--texto);
    font-size: 1.7rem;
}

.radio-group {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.radio-card {
    flex: 1;
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    text-align: center;
    transition: all .25s ease;
    user-select: none;
}

.radio-card:hover {
    transform: translateY(-2px);
    border-color: var(--azul);
    box-shadow: 0 8px 20px rgba(0,123,255,.15);
}

.radio-card .icon {
    display: block;
    font-size: 32px;
    margin-bottom: 10px;
}

.radio-card .title {
    display: block;
    font-size: 17px;
    font-weight: 600;
    color: #333;
}

.radio-card .subtitle {
    display: block;
    margin-top: 5px;
    font-size: 12px;
    color: #777;
    line-height: 1.4;
}

input[type="radio"]:checked + .radio-card {
    background: linear-gradient(
        135deg,
        #007bff 0%,
        #0062cc 100%
    );
    border-color: #007bff;
    box-shadow: 0 10px 25px rgba(0,123,255,.30);
}

input[type="radio"]:checked + .radio-card .icon,
input[type="radio"]:checked + .radio-card .title,
input[type="radio"]:checked + .radio-card .subtitle {
    color: #fff;
}

input[type="text"],
input[type="password"],
input[type="file"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid var(--borda);
    border-radius: 8px;
    font-size: 15px;
    transition: .2s;
}

input[type="text"]:focus,
input[type="password"]:focus,
input[type="file"]:focus {
    border-color: var(--azul);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,123,255,.15);
}

button {
    width: 100%;
    border: none;
    border-radius: 8px;
    padding: 13px;
    margin-top: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: .3s;
}

button[type="submit"] {
    background: var(--azul);
    color: #fff;
}

button[type="submit"]:hover {
    background: var(--azul-hover);
}

.back-button {
    background: var(--cinza);
    color: #fff;
}

.back-button:hover {
    background: var(--cinza-hover);
}

#response {
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    background: #f5f5f5;
    white-space: pre-wrap;
    display: none;
    font-size: 14px;
}

@media (max-width: 600px) {

    .container {
        padding: 20px;
    }

    .radio-group {
        flex-direction: column;
    }

    h1 {
        font-size: 1.4rem;
    }
}
</style>

</head>

<body>

<div class="container">

```
<h1>Importar XML Tecnospeed</h1>

<form id="importForm">

    <div class="radio-group">

        <input type="radio"
               id="cte"
               name="tipoDocumento"
               value="cte"
               checked
               hidden>

        <label for="cte" class="radio-card">
            <span class="icon">📄</span>
            <span class="title">CT-e</span>
            <span class="subtitle">
                Conhecimento de Transporte Eletrônico
            </span>
        </label>

        <input type="radio"
               id="mdfe"
               name="tipoDocumento"
               value="mdfe"
               hidden>

        <label for="mdfe" class="radio-card">
            <span class="icon">🚚</span>
            <span class="title">MDF-e</span>
            <span class="subtitle">
                Manifesto Eletrônico de Documentos
            </span>
        </label>

    </div>

    <input type="text"
           id="grupo"
           placeholder="Grupo"
           required>

    <input type="text"
           id="username"
           placeholder="Usuário"
           required>

    <input type="password"
           id="password"
           placeholder="Senha"
           required>

    <input type="text"
           id="cnpj"
           placeholder="CNPJ"
           required>

    <input type="file"
           id="arquivo"
           accept=".xml"
           required>

    <button type="submit">
        Importar XML
    </button>

</form>

<pre id="response"></pre>

<button class="back-button"
        onclick="window.history.back()">
    Voltar
</button>


</div>

<script>
$(document).ready(function() {

    $('#importForm').on('submit', function(e) {

        e.preventDefault();

        const grupo = $('#grupo').val();
        const cnpj = $('#cnpj').val().replace(/\D/g, '');
        const username = $('#username').val();
        const password = $('#password').val();
        const tipoDocumento = $('input[name="tipoDocumento"]:checked').val();
        const file = $('#arquivo')[0].files[0];

        if (!file) {
            alert('Selecione um arquivo XML.');
            return;
        }

        const reader = new FileReader();

        reader.onload = function(event) {

            const arquivo = event.target.result;
            const token = btoa(username + ":" + password);

            const endpoint =
                tipoDocumento === 'mdfe'
                ? 'https://managersaas.tecnospeed.com.br:8081/ManagerAPIWeb/mdfe/importa'
                : 'https://managersaas.tecnospeed.com.br:8081/ManagerAPIWeb/cte/importa';

            $.ajax({
                url: endpoint,
                method: 'POST',

                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': 'Basic ' + token
                },

                data: {
                    GRUPO: grupo,
                    CNPJ: cnpj,
                    Arquivo: arquivo
                },

                beforeSend: function() {

                    $('#response')
                        .css({
                            display: 'block',
                            color: '#555'
                        })
                        .text('Enviando XML...');
                },

                success: function(response) {

                    $('#response')
                        .css({
                            color: '#28a745',
                            display: 'block'
                        })
                        .text(JSON.stringify(response, null, 2));
                },

                error: function(xhr, status, error) {

                    const msg = xhr.responseText || error;

                    $('#response')
                        .css({
                            color: '#dc3545',
                            display: 'block'
                        })
                        .text(
                            'Status: ' +
                            xhr.status +
                            '\n\n' +
                            msg
                        );
                }
            });

        };

        reader.readAsText(file);

    });

});
</script>

</body>
</html>
